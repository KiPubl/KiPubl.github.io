<!DOCTYPE html>
<html>

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Jim+Nightshade&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="dragon-egg-bg">
    <h1 class="center-header">Critters of the Forgotten Realms</h1>

    <div class="wrapper">
        <div class="container">
            <div>
                <h1>Dragon Eggs</h1>
                <h3><em>Green Dragon Egg</em></h3>
                <p>All dragons lay eggs. The color of the egg is determined by the dragon's coloration. While the exact
                    sizes vary by species, dragon eggs can be quite large, ranging between 2' to 5' tall and weighing up
                    to 250lbs.
                </p>
                <button class="dragon-button">Black</button>
                <button class="dragon-button">Blue</button>
                <button class="dragon-button">Green</button>
                <button class="dragon-button">Red</button>
                <button class="dragon-button">White</button>
            </div>
            <div width="200px" height="auto">
                <img src="img/green-dragon-egg.jpg"
                    alt="A large, oval-shaped dragon egg with a glossy, emerald-green shell. The surface of the egg is smooth and slightly reflective, with subtle variations in color that create a shimmering effect."
                    style="width: 200px; height: auto; border: 1px solid black;">
            </div>
        </div>
    </div>
</body>
