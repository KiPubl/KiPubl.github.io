<!DOCTYPE html>
<html>

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Jim+Nightshade&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="dragon-egg-bg">
    <h1 class="center-header">Critters of the Forgotten Realms</h1>

    <div class="wrapper">
        <div class="container">
            <div>
                <h1>Dragon Eggs</h1>
                <h3 id="Label_Header"><em>Green Dragon Egg</em></h3>
                <p>All dragons lay eggs. The color of the egg is determined by the dragon's coloration. While the exact
                    sizes vary by species, dragon eggs can be quite large, ranging between 2' to 5' tall and weighing up
                    to 250lbs.
                </p>
                <button class="dragon-button" type="button"
                    onclick="document.getElementById('dragonEgg').src = '[img/black-dragon-egg.jpg]';
	                document.getElementById('dragonEgg').alt = 'A large, oval-shaped dragon egg with a glossy, jet-black, brown, and gray shell. The surface of the egg is smooth and slightly reflective.';
	                document.getElementById('Label_Header').innerHTML = '<em>Black Dragon Egg</em>';">Black</button>
                <button class="dragon-button" type="button"
	                onclick="document.getElementById('dragonEgg').src = '[img/blue-dragon-egg.jpg]';
                    document.getElementById('dragonEgg').alt = 'A large, oval-shaped dragon egg with a glossy, azure-blue shell. The surface of the egg is smooth and slightly reflective.';
                    document.getElementById('Label_Header').innerHTML = '<em>Blue Dragon Egg</em>';">Blue</button>
                <button class="dragon-button" type="button"
                    onclick="document.getElementById('dragonEgg').src = '[img/green-dragon-egg.jpg]';
                    document.getElementById('dragonEgg').alt = 'A large, oval-shaped dragon egg with a glossy, emerald-green shell. The surface of the egg is smooth and slightly reflective, with subtle variations in color that create a shimmering effect.';
                    document.getElementById('Label_Header').innerHTML = '<em>Green Dragon Egg</em>';">Green</button>
                <button class="dragon-button" type="button"
                    onclick="document.getElementById('dragonEgg').src = '[img/red-dragon-egg.jpg]';
                    document.getElementById('dragonEgg').alt = 'A large, oval-shaped dragon egg with a glossy, scarlet-red shell. The surface of the egg is smooth and slightly reflective.';
                    document.getElementById('Label_Header').innerHTML = '<em>Red Dragon Egg</em>';">Red</button>
                <button class="dragon-button" type="button"
                    onclick="document.getElementById('dragonEgg').src = '[img/white-dragon-egg.jpg]';
                    document.getElementById('dragonEgg').alt = 'A large, sphere-shaped dragon egg with a glossy, white shell with a dark coating. The surface of the egg is smooth and slightly reflective.';
                    document.getElementById('Label_Header').innerHTML = '<em>White Dragon Egg</em>';">White</button>
            </div>
            <div width="200px" height="auto">
                <img id="dragonEgg" src="img/green-dragon-egg.jpg"
                    alt="A large, oval-shaped dragon egg with a glossy, emerald-green shell. The surface of the egg is smooth and slightly reflective, with subtle variations in color that create a shimmering effect."
                    style="width: 200px; height: auto; border: 1px solid black;">
            </div>
        </div>
    </div>
</body>
